name: Deploy Docs and DAS Variant to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .npmrc
        run: |
          echo "@jeppesen-foreflight:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          echo "Created the following .npmrc:"; cat .npmrc

      # Install Node
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Build both projects
      - name: Build original docs
        run: npm run build:original:gh

      - name: Build DAS docs
        run: npm run build:das:gh

      # Prepare deployment folder
      - name: Prepare publish directory
        run: |
          mkdir -p publish/original
          mkdir -p publish/das
          cp -r dist/browser/* publish/original/
          cp -r dist-das/browser/* publish/das/

      # Deploy
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          force_orphan: true