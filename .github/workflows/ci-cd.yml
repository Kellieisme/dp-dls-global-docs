name: ci-cd

on:
  push:
    branches:
      - main
      - develop
      - '*' # Matches any branch name
  pull_request:
    branches:
      - develop

jobs:
  build-repo:
    name: Build Branch
    runs-on: ubuntu-latest
    if: github.ref_name != 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create .npmrc
        run: |
          echo "@dasdigitalplatform:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          echo "Created the following .npmrc:"; cat .npmrc

      - name: Install dependencies
        run: npm install --loglevel silly

      - name: Build for branch
        run: npm run build:branch

      - name: List branch directory
        run: ls -la "branch/" || echo "Directory does not exist yet"

      - name: List branch/$GITHUB_REF_NAME directory
        run: ls -la "branch/${{ github.head_ref }}" || echo "Directory does not exist yet"

      - name: List browser subdirectory
        run: ls -la "branch/${{ github.head_ref }}/browser" || echo "Directory does not exist yet"

      - name: List browser contents
        run: ls -la "branch/${{ github.head_ref }}/browser/*" || echo "Directory does not exist yet"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: branch

  build-static-site:
    name: Build Develop
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create .npmrc
        run: |
          echo "@dasdigitalplatform:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          echo "Created the following .npmrc:"; cat .npmrc

      - name: Install dependencies
        run: npm install --loglevel silly

      - name: Build for develop
        run: |
          echo "Build storybook for develop."
          npm run build:prod
          rm -rf dist/server
          mv -v dist/browser public
          ls -la "public/" || echo "Directory does not exist yet"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-branch-url:
    name: Deploy Branch URL
    runs-on: ubuntu-latest
    needs: build-repo
    if: github.ref_name != 'develop'
    steps:
      - name: Output URL
        run: echo "Branch URL will be https://${{ vars.NPM_REGISTRY_URL }}/${{ github.head_ref }}/branch/"
    environment:
      name: ${{ github.head_ref }}/branch
      url: https://${{ vars.NPM_REGISTRY_URL }}/${{ github.head_ref }}/branch/

  deploy-main-url:
    name: Deploy Main URL
    runs-on: ubuntu-latest
    needs: build-static-site
    if: github.ref_name == 'develop'
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          commit_message: Deploy to GitHub Pages
    environment:
      name: "Pages"
      url: ${{ github.pages_url }}

  pages:
    name: Deploy Branch Pages
    runs-on: ubuntu-latest
    needs: build-repo
    if: github.ref_name != 'develop'
    steps:
      - name: Download branch artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: branch

      - name: Download develop artifact (if exists)
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: public
          if-no-files-found: ignore

      - name: Create public directory if it doesn't exist
        run: mkdir -p public

      - name: List directories
        run: |
          echo "branch"
          ls -la "branch" || echo "Directory does not exist yet"
          echo "public"
          ls -la "public/" || echo "Directory does not exist yet"
          echo "branch/${{ github.head_ref }}"
          ls -la "branch/${{ github.head_ref }}" || echo "Directory does not exist yet"
          echo "public/${{ github.head_ref }}"
          ls -la "public/${{ github.head_ref }}" || echo "Directory does not exist yet"

      - name: Move branch files to public
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            rm -rf "public/${{ github.head_ref }}" || echo "Directory does not exist yet"
            mkdir -p "public/${{ github.head_ref }}";
            mv -v branch/${{ github.head_ref }}/browser/* public/${{ github.head_ref }}
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  pages-main:
    name: Deploy Main Pages
    runs-on: ubuntu-latest
    needs: build-static-site
    if: github.ref_name == 'develop'
    steps:
      - name: Download develop artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: public

      - name: List public directory
        run: |
          echo "public"
          ls -la "public/" || echo "Directory does not exist yet"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          commit_message: Deploy main to GitHub Pages

  pages-clean-preview:
    name: Clean Preview Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all history for branch comparison

      - name: Download pages artifact (if exists)
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: public
          if-no-files-found: ignore

      - name: List public directory
        run: ls public/ || echo "Public directory does not exist"

      - name: Stop environment
        run: echo "Stopping environment for ${{ github.head_ref }}"
    environment:
      name: pages/${{ github.head_ref }}
      action: stop
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true

  pages-clean-delete:
    name: Clean Deleted Branch Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all history for branch comparison

      - name: Download pages artifact (if exists)
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: public
          if-no-files-found: ignore

      - name: Set FOLDER_TO_DELETE
        run: echo "FOLDER=${{ github.event.inputs.folder_to_delete }}" >> $GITHUB_ENV
        if: github.event_name == 'workflow_dispatch'

      - name: List public directory
        run: ls public/ || echo "Public directory does not exist"

      - name: Delete branch folder
        run: |
          echo "FOLDER_TO_DELETE: $FOLDER_TO_DELETE"
          echo "rm -rf public/$FOLDER_TO_DELETE"
          rm -rf "public/$FOLDER_TO_DELETE"
          ls public/
        env:
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete || github.head_ref }}

      - name: Stop environment
        run: echo "Stopping environment for ${{ github.head_ref }}"
    environment:
      name: pages/${{ github.head_ref }}
      action: stop
    if: github.event_name == 'workflow_dispatch'

  pr-develop:
    name: Test Pull Request on Develop
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Log NPM configuration
        run: |
          echo "===== NPM Configuration ====="
          npm config list
          echo "Registry:$(npm config get registry)"

      - name: Create .npmrc
        run: |
          echo "@dasdigitalplatform:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          echo "Created the following .npmrc:"; cat .npmrc

      - name: Verify registry access
        run: curl -I https://${{ secrets.JFROG_URL }}/${{ secrets.JFROG_REPO }}/ || exit 1

      - name: Install dependencies
        run: npm install || exit 1

      - name: Run build and test scripts
        run: npm run build:prod || exit 1

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/

      - name: Upload lint results artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: lint-results/
