
name: ci-cd

on:
  push:
    branches:
      - main
      - develop
      - dochub-19
      - dochub-20
      - dochub-21
      - '*' # Matches any branch name
  pull_request:
    branches:
      - develop
      - dochub-19
      - dochub-20
      - dochub-21
  workflow_dispatch:
    inputs:
      folder_to_delete:
        description: 'Folder name to delete from pages'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pages: write
  packages: read

jobs:
  build-repo:
    name: Build Branch
    runs-on: ubuntu-latest
    if: github.ref_name != 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create .npmrc
        run: |
          echo "@jeppesen-foreflight:registry=https://${{ vars.NPM_REGISTRY_URL }}/" >> .npmrc
          echo "//${{ vars.NPM_REGISTRY_URL }}/:_authToken=${{ secrets.GN_GITHUB_TOKEN }}" >> .npmrc
          echo "Created the following .npmrc:"; cat .npmrc

      - name: Install dependencies
        run: npm install --loglevel verbose

      - name: Build for branch
        run: npm run build:branch

      - name: List branch directory
        run: ls -la "branch/" || echo "Directory does not exist yet"

      - name: List branch/$GITHUB_REF_NAME directory
        run: ls -la "branch/${{ github.head_ref }}" || echo "Directory does not exist yet"

      - name: List browser subdirectory
        run: ls -la "branch/${{ github.head_ref }}/browser" || echo "Directory does not exist yet"

      - name: List browser contents
        run: ls -la "branch/${{ github.head_ref }}/browser/*" || echo "Directory does not exist yet"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: branch

