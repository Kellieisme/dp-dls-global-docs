<ng-container *ngIf="pageData$ | async as pageData">

  <header class="header--level-two">
    <div>
      <h1 class="display-high">{{pageData.header.title}}</h1>
      <p class="body-low-default">{{pageData.header.description}}</p>
    </div>
    <div class="header__image" [style]="backgroundImage"></div>
  </header>

  <main class="main main--columns">

    <section *ngFor="let section of pageData.sections">

      <!--TYPE: text-image-->
      <ng-container *ngIf="section.type === 'text-image'">
        <div class="row row-cols-1 row-cols-sm-2">
          <div class="col">
            <div class="col__content" [innerHTML]="section.text"></div>
          </div>
          <div class="col">
            <img class="img-fluid" [src]="section.imgSrc" [alt]="section.imgAlt" />
            <p *ngIf="section.imgText">{{section.imgText}}</p>
          </div>
        </div>
      </ng-container>

      <!--TYPE: text-column-->
      <ng-container *ngIf="section.type === 'text-column'">
        <div class="row row-cols-1 row-cols-sm-2">
          <div class="col">
            <div class="col__content" [innerHTML]="section.text"></div>
          </div>
          <div class="col"></div>
        </div>
      </ng-container>

      <!--TYPE: table-->
      <ng-container *ngIf="section.type === 'table'">
        <div class="col__content">
          <h3 class="title-high" *ngIf="section.heading">{{section.heading}}</h3>
          <table mat-table [dataSource]="section.data">
            <ng-container *ngFor="let col of section.cols" [matColumnDef]="col.id">
              <th mat-header-cell *matHeaderCellDef> {{col.label}} </th>
              <td mat-cell *matCellDef="let element" [innerHTML]="element[col.id]"></td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="section.displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: section.displayedColumns;"></tr>
          </table>
        </div>
      </ng-container>

      <!--TYPE: list-column-->
      <ng-container *ngIf="section.type === 'list-column'">
        <div class="row row-cols-1 row-cols-sm-2">
          <div class="col">
            <div class="col__content">
              <div [innerHTML]="section.text"></div>
              <ul class="link-list">
                <li class="link-list__item" *ngFor="let item of section.items">
                  <ng-container *ngIf="item.link.startsWith('/')">
                    <a mat-icon-button color="primary" [routerLink]="item.link" aria-label="label">
                      <mat-icon [svgIcon]="item.icon"></mat-icon>
                    </a>
                  </ng-container>
                  <ng-container *ngIf="!item.link.startsWith('/')">
                    <a mat-icon-button color="primary" [href]="item.link" target="_blank" aria-label="label">
                      <mat-icon [svgIcon]="item.icon"></mat-icon>
                    </a>
                  </ng-container>
                  <span [innerHTML]="item.text"></span>
                </li>
              </ul>
            </div>
          </div>
          <div class="col"></div>
        </div>
      </ng-container>

    </section>

  </main>

  <app-footer />

</ng-container>
